<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AutoLuxe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
 
<div class="form-card">
    <div class="form-logo">
        <a href="index.html" style="text-decoration:none; display:inline-block;">
            <div class="logo-icon" style="margin: 0 auto; width: 50px; height: 50px; font-size: 24px;">🚗</div>
        </a>
        <h2>Create Account</h2>
        <p>Join AutoLuxe and start buying or selling</p>
    </div>
 
    <form action="register.php" method="POST" id="registerForm">
        <div class="form-group">
            <label for="name">Full Name</label>
            <div class="input-group">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                <input type="text" id="name" name="name" placeholder="Ahmed Ben Ali" required autocomplete="name">
            </div>
        </div>
 
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-group">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
        </div>
 
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" name="password" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
            </div>
        </div>
 
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <div class="input-group">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                <input type="password" id="confirm" name="confirm" placeholder="Repeat your password" required autocomplete="new-password">
            </div>
        </div>
 
        <div id="alert-msg"></div>
 
        <button type="submit" class="btn-primary" id="submitBtn">Create Account</button>
    </form>
 
    <div class="form-footer">
        Already have an account? <a href="login.html">Sign in</a>
    </div>
</div>
 
<script>
document.getElementById('registerForm').addEventListener('submit', function(e) {
    const pass = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const alertBox = document.getElementById('alert-msg');
 
    if (pass !== confirm) {
        e.preventDefault();
        alertBox.innerHTML = '<div class="alert alert-error">⚠️ Passwords do not match.</div>';
        return;
    }
 
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Creating account…';
});
</script>
</body>
</html>
