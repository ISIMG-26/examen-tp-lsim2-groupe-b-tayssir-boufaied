<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AutoLuxe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="form-page">
 
<div class="form-card">
    <div class="form-logo">
        <a href="index.html" style="text-decoration:none; display:inline-block;">
            <div class="logo-icon" style="margin: 0 auto; width: 50px; height: 50px; font-size: 24px;">🚗</div>
        </a>
        <h2>Welcome back</h2>
        <p>Sign in to your AutoLuxe account</p>
    </div>
 
    <div id="alert-msg"></div>
 
    <form action="login_process.php" method="POST" id="loginForm">
        <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-group">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
            </div>
        </div>
 
        <div class="form-group">
            <label for="password">Password</label>
            <div class="input-group">
                <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
            </div>
        </div>
 
        <button type="submit" class="btn-primary" id="submitBtn">Sign In</button>
    </form>
 
    <div class="form-footer">
        Don't have an account? <a href="register.html">Create one free</a>
    </div>
</div>
 
<script>
// Client-side UX improvements
document.getElementById('loginForm').addEventListener('submit', function(e) {
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
});
</script>
</body>
</html>
